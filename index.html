<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub</title>
  <meta name="theme-color" content="#173B5C" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">📚</div>
      <div>
        <h1>StudyHub</h1>
        <p>Medical Knowledge System</p>
      </div>
    </div>

    <nav class="nav-list">
      <button class="nav-btn active" data-view="dashboard">🏠 Dashboard</button>
      <button class="nav-btn" data-view="library">📚 Library</button>
      <button class="nav-btn" data-view="notes">📝 Notes</button>
      <button class="nav-btn" data-view="maps">🗺 Study Maps</button>
      <button class="nav-btn" data-view="remediation">🩺 Remediation</button>
      <button class="nav-btn" data-view="uploads">📎 Uploads</button>
      <button class="nav-btn" data-view="search">🔍 Search</button>
    </nav>

    <div class="sidebar-footer">
      <p>v0.1 Academic Dashboard</p>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div>
        <p class="eyebrow">Good afternoon, Aniyah</p>
        <h2 id="viewTitle">Dashboard</h2>
      </div>
      <label class="command-search">
        <span>🔍</span>
        <input id="globalSearch" type="search" placeholder="Search potassium, erythrocyte, heart failure..." />
        <kbd>Ctrl K</kbd>
      </label>
    </header>

    <section id="view" class="view"></section>
  </main>

  <button class="capture-btn" id="captureBtn">＋ Capture</button>
  <script src="js/app.js"></script>
</body>
</html>
